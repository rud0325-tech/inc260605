<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="광탄중학교 챗봇 프렌" />
  <title>광탄중학교 챗봇 프렌</title>

  <!-- 둥글고 산뜻한 한글 폰트 (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">

  <!-- Bot Framework Web Chat 라이브러리 (마이크로소프트 CDN) -->
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>

  <script>
    /* =========================================================
       토큰 엔드포인트 (코파일럿 스튜디오에서 복사한 값)
    ========================================================= */
    const tokenEndpoint = "https://default62ae463a9f124edf85444f6ca38345.24.environment.api.powerplatform.com/powervirtualagents/botsbyschema/copilots_header_2afd5/directline/token?api-version=2022-03-01-preview";

    /* =========================================================
       챗봇 내부 색상 — 파스텔톤
       (#RRGGBB 색상 코드만 바꾸면 됩니다)
    ========================================================= */
    const styleOptions = {
      accent: "#8FD3C4",                       // 강조색 (파스텔 민트)
      backgroundColor: "#FFFFFF",              // 대화 영역 배경

      // 챗봇(봇) 말풍선 — 파스텔 민트
      bubbleBackground: "#E7F6F0",
      bubbleTextColor: "#46555C",
      bubbleBorderColor: "#D5EEE5",
      bubbleBorderRadius: 18,
      bubbleBorderWidth: 1,

      // 사용자(학생) 말풍선 — 파스텔 복숭아
      bubbleFromUserBackground: "#FDEDE2",
      bubbleFromUserTextColor: "#46555C",
      bubbleFromUserBorderColor: "#F8DAC8",
      bubbleFromUserBorderRadius: 18,
      bubbleFromUserBorderWidth: 1,

      // 입력창
      sendBoxBackground: "#FFFFFF",
      sendBoxTextColor: "#46555C",
      sendBoxButtonColor: "#7FC9BA",           // 보내기 버튼 (살짝 진한 민트)
      sendBoxButtonColorOnHover: "#5FB3A2",
      sendBoxPlaceholderColor: "#A7B5BA",

      // 추천 질문 버튼 — 파스텔 하늘
      suggestedActionBackgroundColor: "#E4F1FA",
      suggestedActionTextColor: "#4A6E7E",
      suggestedActionBorderColor: "#CFE6F4",
      suggestedActionBorderRadius: 16,
      suggestedActionBorderWidth: 1,

      // 아바타 (글자 아바타)
      botAvatarInitials: "프렌",
      botAvatarBackgroundColor: "#A8DCC9",     // 파스텔 민트
      userAvatarInitials: "나",
      userAvatarBackgroundColor: "#F6C9AE",    // 파스텔 복숭아
      avatarSize: 36,
      avatarBorderRadius: "50%",

      // 글꼴
      primaryFont: "'Gowun Dodum', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    };

    let directLineUrl = null;

    const environmentEndPoint = tokenEndpoint.slice(0, tokenEndpoint.indexOf("/powervirtualagents"));
    const apiVersion = tokenEndpoint.slice(tokenEndpoint.indexOf("api-version")).split("=")[1];
    const regionalChannelSettingsURL =
      `${environmentEndPoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`;

    function createCustomStore() {
      return window.WebChat.createStore({}, ({ dispatch }) => next => action => {
        if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
          dispatch({
            type: "DIRECT_LINE/POST_ACTIVITY",
            meta: { method: "keyboard" },
            payload: {
              activity: {
                channelData: { postBack: true },
                name: "startConversation",
                type: "event"
              }
            }
          });
        }
        return next(action);
      });
    }

    async function initializeChat() {
      try {
        const settingsResponse = await fetch(regionalChannelSettingsURL);
        const settingsData = await settingsResponse.json();
        directLineUrl = settingsData.channelUrlsById.directline;
        if (!directLineUrl) throw new Error("DirectLine URL을 가져오지 못했습니다.");

        const tokenResponse = await fetch(tokenEndpoint);
        const tokenInfo = await tokenResponse.json();
        if (!tokenInfo.token) throw new Error("대화 토큰을 가져오지 못했습니다.");

        const directLine = window.WebChat.createDirectLine({
          domain: `${directLineUrl}v3/directline`,
          token: tokenInfo.token
        });

        window.WebChat.renderWebChat(
          { directLine, styleOptions, store: createCustomStore() },
          document.getElementById("webchat")
        );
      } catch (err) {
        console.error("챗봇 초기화 실패:", err);
        document.getElementById("webchat").innerHTML =
          '<div class="error-msg">챗봇을 불러오지 못했어요.<br>토큰 엔드포인트와 게시 상태를 확인해 주세요.</div>';
      }
    }

    document.addEventListener("DOMContentLoaded", initializeChat);
  </script>

  <style>
    :root {
      /* 파스텔 팔레트 */
      --mint:   #C5EDE0;
      --sky:    #C7E6F5;
      --peach:  #FCE0CE;
      --lav:    #E5D8F4;
      --yellow: #FCF1C7;
      --bg:     #F2FAFB;   /* 산뜻한 배경 */
      --ink:    #46555C;   /* 부드러운 진한 글자색 */
      --ink-sub:#7E9098;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: "Gowun Dodum", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* 상단 헤더 — 파스텔 그라데이션 */
    header {
      background: linear-gradient(120deg, var(--mint) 0%, var(--sky) 100%);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .badge {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 8px rgba(120, 160, 170, 0.25);
      flex-shrink: 0;
    }
    .badge svg { width: 26px; height: 26px; }
    .header-text h1 {
      margin: 0;
      font-family: "Jua", "Gowun Dodum", sans-serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #3A5860;
      letter-spacing: 0.01em;
    }
    .header-text p {
      margin: 3px 0 0;
      font-size: 0.82rem;
      color: #527078;
    }

    /* 챗봇 영역 */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 22px;
      min-height: 0;
    }
    .chat-card {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(130, 170, 180, 0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* 카드 위 파스텔 무지개 띠 */
    .chat-card::before {
      content: "";
      height: 5px;
      flex-shrink: 0;
      background: linear-gradient(90deg,
        var(--mint) 0% 25%, var(--sky) 25% 50%,
        var(--lav) 50% 75%, var(--peach) 75% 100%);
    }
    #webchat { flex: 1; min-height: 0; }

    .error-msg {
      padding: 44px 24px;
      text-align: center;
      color: var(--ink-sub);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.72rem;
      color: var(--ink-sub);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      main { padding: 0; }
      .chat-card { border-radius: 0; max-width: 100%; }
      header { padding: 14px 18px; }
      .header-text h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge" aria-hidden="true">
      <!-- 산뜻한 말풍선 + 미소 아이콘 -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 5.5C4 4.7 4.7 4 5.5 4h13c.8 0 1.5.7 1.5 1.5v9c0 .8-.7 1.5-1.5 1.5H9l-4 4v-4H5.5C4.7 16 4 15.3 4 14.5v-9Z"
              fill="#8FD3C4"/>
        <circle cx="9.3" cy="9.5" r="1.1" fill="#fff"/>
        <circle cx="14.7" cy="9.5" r="1.1" fill="#fff"/>
        <path d="M9 12c.8.9 1.9 1.4 3 1.4s2.2-.5 3-1.4" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>광탄중학교 챗봇 프렌</h1>
      <p>궁금한 건 무엇이든 편하게 물어보세요</p>
    </div>
  </header>

  <main>
    <div class="chat-card">
      <div id="webchat" role="main"></div>
    </div>
  </main>

  <footer>Powered by Microsoft Copilot Studio</footer>

</body>
</html>
